name: Publish APM Marketplace

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Optional version label for artifact names.
        required: false
        type: string
      publish_release:
        description: Create or update a GitHub Release for this version.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-apm-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up APM
        uses: microsoft/apm-action@v1
        with:
          setup-only: "true"
          apm-version: "0.18.0"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up GraalVM Java
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install validation dependencies
        run: npm ci

      - name: Validate source
        run: |
          ./gradlew :cli:test installDevelopmentCli
          .local/intelligence/bin/intelligence validate --portable
          .local/intelligence/bin/intelligence marketplace materialize --provider codex --out /tmp/intelligence-codex-marketplace
          .local/intelligence/bin/intelligence validate --portable --hydrated /tmp/intelligence-codex-marketplace
          .local/intelligence/bin/intelligence marketplace materialize --provider github --out /tmp/intelligence-github-marketplace
          .local/intelligence/bin/intelligence validate --portable --hydrated /tmp/intelligence-github-marketplace

      - name: Publish Codex marketplace branch
        run: .local/intelligence/bin/intelligence marketplace publish-branch --provider codex --branch codex

      - name: Publish GitHub marketplace branch
        run: .local/intelligence/bin/intelligence marketplace publish-branch --provider github --branch github
