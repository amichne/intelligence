name: Verify Marketplace Publication

on:
  pull_request:
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/sync-provider-marketplaces.yml"
      - ".agents/**"
      - ".github/plugin/**"
      - "marketplace-lock.json"
      - "package-lock.json"
      - "package.json"
      - "plugins/**"
      - "source/**"
      - "scripts/publish-marketplace.py"
      - "scripts/validate-manifests.mjs"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/sync-provider-marketplaces.yml"
      - ".agents/**"
      - ".github/plugin/**"
      - "marketplace-lock.json"
      - "package-lock.json"
      - "package.json"
      - "plugins/**"
      - "source/**"
      - "scripts/publish-marketplace.py"
      - "scripts/validate-manifests.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-marketplace-publication-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Validate source manifests
        run: node scripts/validate-manifests.mjs --portable

      - name: Materialize Codex marketplace
        run: python3 scripts/publish-marketplace.py materialize --provider codex --out /tmp/intelligence-codex-marketplace

      - name: Validate Codex marketplace payload
        run: node scripts/validate-manifests.mjs --portable --hydrated /tmp/intelligence-codex-marketplace

      - name: Materialize GitHub marketplace
        run: python3 scripts/publish-marketplace.py materialize --provider github --out /tmp/intelligence-github-marketplace

      - name: Validate GitHub marketplace payload
        run: node scripts/validate-manifests.mjs --portable --hydrated /tmp/intelligence-github-marketplace

      - name: Synchronize main adapted marketplaces on same-repository pull requests
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          paths=".agents/plugins/marketplace.json marketplace-lock.json plugins .github/plugin/marketplace.json .github/plugin/plugins"
          python3 scripts/publish-marketplace.py sync-main-marketplaces
          if [ -z "$(git status --porcelain -- ${paths})" ]; then
            echo "main adapted marketplaces already current"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A -- ${paths}
          git commit -m "Publish adapted marketplace manifests"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Verify main adapted marketplaces
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
        run: python3 scripts/publish-marketplace.py sync-main-marketplaces --check
