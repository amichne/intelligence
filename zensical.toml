[project]
site_name = "amichne-intelligence"
site_description = """
Portable marketplace CLI and schema contracts for reusable AI tooling.
"""
site_author = "amichne"
site_url = "https://github.com/amichne/intelligence"
repo_url = "https://github.com/amichne/intelligence"
repo_name = "amichne/intelligence"
edit_uri = "edit/main/docs"
docs_dir = "docs"
site_dir = "site"
copyright = """
Copyright &copy; 2026 amichne
"""
nav = [
  { "Overview" = "index.md" },
  { "Why it matters" = "why-it-matters.md" },
  { "Getting started" = [
    { "Overview" = "getting-started/index.md" },
    { "Marketplace" = "getting-started/marketplace.md" },
  ]},
  { "What is available" = [
    { "Overview" = "available/index.md" },
    { "Plugin families" = "available/plugin-families.md" },
    { "Primitives" = "available/primitives.md" },
  ]},
  { "How it works" = [
    { "Marketplace projection" = "how-it-works/package-graph.md" },
    { "Validation" = "how-it-works/validation.md" },
  ]},
  { "Reference" = [
    { "Repository map" = "reference/repository-map.md" },
    { "Commands" = "reference/commands.md" },
    { "Product requirements V1" = "reference/product-requirements-v1.md" },
    { "Minimal public CLI V1" = "reference/cli-contract-v1.md" },
    { "Black-box acceptance V1" = "reference/acceptance-scenarios-v1.md" },
    { "Implementation tracers V1" = "reference/implementation-tracers-v1.md" },
    { "Publication" = "reference/publication.md" },
    { "Codex projection research" = "reference/codex-projection-research.md" },
    { "Codex projection V1" = "reference/codex-projection-v1.md" },
    { "GitHub Copilot projection research" = "reference/github-copilot-projection-research.md" },
    { "GitHub Copilot projection V1" = "reference/github-copilot-projection-v1.md" },
    { "GitHub release mechanics research" = "reference/github-release-mechanics-research.md" },
    { "Immutable snapshot publication V1" = "reference/immutable-snapshot-publication-v1.md" },
    { "Portable package marketplace V1" = "reference/portable-package-marketplace-v1.md" },
    { "Consumer selection and reproducibility V1" = "reference/consumer-selection-reproducibility-v1.md" },
    { "Validation trust boundary V1" = "reference/validation-trust-boundary-v1.md" },
    { "Documentation site" = "reference/documentation-site.md" },
    { "Glossary" = "reference/glossary.md" },
  ]},
]

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tabbed.slugify]
object = "pymdownx.slugs.slugify"
kwds = { case = "lower" }

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.theme]
language = "en"
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.tabs.link",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/network"
repo = "fontawesome/brands/github"
edit = "material/file-edit-outline"
view = "material/file-eye-outline"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
