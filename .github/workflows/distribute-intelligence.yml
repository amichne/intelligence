name: Distribute Intelligence CLI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: distribute-intelligence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve distribution metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve artifact version
        id: version
        run: |
          set -euo pipefail
          version="$(git rev-parse --short=12 HEAD)"
          version="$(printf '%s' "${version}" | tr -c 'A-Za-z0-9._-' '-')"
          version="${version##[-._]}"
          version="${version%%[-._]}"
          if [[ -z "${version}" ]]; then
            echo "::error::resolved artifact version is empty"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved package version: ${version}"

  validate:
    name: Validate CLI source
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate CLI source
        run: |
          ./gradlew check
          .local/intelligence/bin/intelligence --version
          .local/intelligence/bin/intelligence project --help
          packaging/homebrew/scripts/test-formula.py
          .github/scripts/test-release-asset-verifier.sh
          .github/scripts/test-release-workflow-contract.sh

  jvm-distribution:
    name: Build JVM CLI distribution
    needs:
      - metadata
      - validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JVM distribution
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          asset="dist/intelligence-${version}.tar.gz"
          ./gradlew :cli:distTar --no-daemon -PintelligenceVersion="${version}"
          mkdir -p dist
          cp cli/build/distributions/intelligence.tar.gz "${asset}"
          echo "asset=${asset}" >> "${GITHUB_ENV}"

      - name: Verify JVM distribution
        run: |
          set -euo pipefail
          repo="${PWD}"
          smoke_root="${RUNNER_TEMP:-/tmp}/intelligence-smoke"
          rm -rf "${smoke_root}"
          mkdir -p "${smoke_root}"
          tar -xzf "${asset}" -C "${smoke_root}"
          cli="${smoke_root}/intelligence/bin/intelligence"
          version="${{ needs.metadata.outputs.version }}"

          "${cli}" --help
          "${cli}" --version | grep -F "intelligence version ${version}"
          "${cli}" project --source "${repo}" --harness codex --out "${smoke_root}/codex"
          "${cli}" project --source "${repo}" --harness github-copilot --out "${smoke_root}/github-copilot"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-${{ needs.metadata.outputs.version }}
          path: ${{ env.asset }}
          if-no-files-found: error
