name: Verify Marketplace Publication

on:
  pull_request:
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/sync-provider-marketplaces.yml"
      - ".sdkmanrc"
      - "build.gradle.kts"
      - "cli/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - "source/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/sync-provider-marketplaces.yml"
      - ".sdkmanrc"
      - "build.gradle.kts"
      - "cli/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - "source/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-marketplace-publication-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up GraalVM Java
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and validate source
        run: |
          ./gradlew :cli:test installDevelopmentCli
          .local/intelligence/bin/intelligence validate --portable

      - name: Materialize Codex marketplace
        run: .local/intelligence/bin/intelligence marketplace materialize --provider codex --out /tmp/intelligence-codex-marketplace

      - name: Validate Codex marketplace payload
        run: .local/intelligence/bin/intelligence validate --portable --hydrated /tmp/intelligence-codex-marketplace

      - name: Materialize GitHub marketplace
        run: .local/intelligence/bin/intelligence marketplace materialize --provider github --out /tmp/intelligence-github-marketplace

      - name: Validate GitHub marketplace payload
        run: .local/intelligence/bin/intelligence validate --portable --hydrated /tmp/intelligence-github-marketplace

      - name: Publish default marketplaces
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: .local/intelligence/bin/intelligence marketplace publish

      - name: Validate default marketplace payloads
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: .local/intelligence/bin/intelligence validate --portable --hydrated .

      - name: Commit default marketplace payloads
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git add -A -f -- .agents/plugins .github/plugin
          if git diff --cached --quiet -- .agents/plugins .github/plugin; then
            echo "default marketplace payloads are up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: publish default marketplaces"
          git push
