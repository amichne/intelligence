name: Distribute Intelligence CLI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version label for artifact names.
        required: false
        type: string
      publish_release:
        description: Create or update a GitHub Release for this version.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: distribute-intelligence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve distribution metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve artifact version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git rev-parse --short=12 HEAD)"
          fi
          version="$(printf '%s' "${version}" | tr -c 'A-Za-z0-9._-' '-')"
          version="${version##[-._]}"
          version="${version%%[-._]}"
          if [[ -z "${version}" ]]; then
            echo "::error::resolved artifact version is empty"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved package version: ${version}"

  validate:
    name: Validate CLI source
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate CLI source
        run: |
          ./gradlew :cli:test installDevelopmentCli
          .local/intelligence/bin/intelligence validate --portable
          packaging/homebrew/scripts/test-formula.py

  native:
    name: Build native CLI (${{ matrix.target }})
    needs:
      - metadata
      - validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-24.04
            executable: intelligence
            extension: ""
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            executable: intelligence
            extension: ""
          - target: macos-x64
            runner: macos-15-intel
            executable: intelligence
            extension: ""
          - target: macos-arm64
            runner: macos-15
            executable: intelligence
            extension: ""
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native executable
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          target="${{ matrix.target }}"
          asset="dist/intelligence-${version}-${target}${{ matrix.extension }}"
          ./gradlew :cli:nativeCompile --no-daemon
          mkdir -p dist
          cp "cli/build/native/nativeCompile/${{ matrix.executable }}" "${asset}"
          if [[ "${RUNNER_OS}" != "Windows" ]]; then
            strip "${asset}" || true
          fi
          chmod 0755 "${asset}" || true
          echo "asset=${asset}" >> "${GITHUB_ENV}"

      - name: Verify native executable
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          repo="${PWD}"
          smoke_root="${RUNNER_TEMP:-/tmp}/intelligence-smoke-${target}"
          if command -v cygpath >/dev/null 2>&1; then
            repo="$(cygpath -m "${PWD}")"
            smoke_root="$(cygpath -m "${smoke_root}")"
          fi
          rm -rf "${smoke_root}"
          mkdir -p "${smoke_root}"

          env -u JAVA_HOME -u JDK_HOME -u GRAALVM_HOME "${asset}" --help
          env -u JAVA_HOME -u JDK_HOME -u GRAALVM_HOME "${asset}" validate --repo "${repo}" --portable
          env -u JAVA_HOME -u JDK_HOME -u GRAALVM_HOME "${asset}" marketplace materialize --repo "${repo}" --provider codex --out "${smoke_root}/codex-marketplace"
          env -u JAVA_HOME -u JDK_HOME -u GRAALVM_HOME "${asset}" validate --repo "${repo}" --portable --hydrated "${smoke_root}/codex-marketplace"
          env -u JAVA_HOME -u JDK_HOME -u GRAALVM_HOME "${asset}" marketplace materialize --repo "${repo}" --provider github --out "${smoke_root}/github-marketplace"
          env -u JAVA_HOME -u JDK_HOME -u GRAALVM_HOME "${asset}" validate --repo "${repo}" --portable --hydrated "${smoke_root}/github-marketplace"

      - name: Verify no JVM linkage
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          linkage="${RUNNER_TEMP:-/tmp}/intelligence-linkage.txt"
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            otool -L "${asset}" | tee "${linkage}"
          else
            ldd "${asset}" | tee "${linkage}" || true
          fi
          if grep -Eiq 'libjvm|libjli|JavaVirtualMachines|/java/' "${linkage}"; then
            echo "::error::native executable links against a JVM runtime"
            exit 1
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-${{ needs.metadata.outputs.version }}-${{ matrix.target }}
          path: ${{ env.asset }}
          if-no-files-found: error

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    needs:
      - metadata
      - native
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: intelligence-${{ needs.metadata.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 intelligence-* > SHA256SUMS

      - name: Resolve release tag
        id: tag
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${INPUT_VERSION}"
            if [[ -z "${tag}" ]]; then
              echo "::error::workflow_dispatch release publishing requires the version input"
              exit 1
            fi
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* --generate-notes --title "${tag}"
          fi

      - name: Render and push Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping Homebrew tap update for non-stable release tag ${tag}"
            exit 0
          fi
          [[ -n "${GH_TOKEN:-}" ]] || { echo "::error::Missing HOMEBREW_TAP_TOKEN secret; stable releases cannot update amichne/homebrew-intelligence."; exit 1; }

          sha_for() {
            local asset="$1"
            awk -v name="$asset" '$2 == name { print $1 }' dist/SHA256SUMS
          }

          sha_linux_x64="$(sha_for "intelligence-${tag}-linux-x64")"
          sha_linux_arm64="$(sha_for "intelligence-${tag}-linux-arm64")"
          sha_macos_x64="$(sha_for "intelligence-${tag}-macos-x64")"
          sha_macos_arm64="$(sha_for "intelligence-${tag}-macos-arm64")"
          for value in "$sha_linux_x64" "$sha_linux_arm64" "$sha_macos_x64" "$sha_macos_arm64"; do
            [[ -n "$value" ]] || { echo "::error::Missing Homebrew checksum input"; exit 1; }
          done

          gh repo clone amichne/homebrew-intelligence homebrew-tap -- --depth 1
          git -C homebrew-tap remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/amichne/homebrew-intelligence.git"
          mkdir -p homebrew-tap/Formula
          rsync -a --delete packaging/homebrew/Formula/ homebrew-tap/Formula/
          cp packaging/homebrew/README.md homebrew-tap/README.md
          cp packaging/homebrew/release-state.json homebrew-tap/release-state.json

          INTELLIGENCE_TAP_ROOT=homebrew-tap \
          VERSION="$tag" \
          SHA256_MACOS_X64="$sha_macos_x64" \
          SHA256_MACOS_ARM64="$sha_macos_arm64" \
          SHA256_LINUX_X64="$sha_linux_x64" \
          SHA256_LINUX_ARM64="$sha_linux_arm64" \
          packaging/homebrew/scripts/update-formula.py

          ruby -c homebrew-tap/Formula/intelligence.rb
          git -C homebrew-tap diff --check

          tap_status="$(git -C homebrew-tap status --porcelain --untracked-files=all)"
          if [[ -z "$tap_status" ]]; then
            echo "Homebrew tap already up to date for ${tag}"
            exit 0
          fi
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add -A
          git -C homebrew-tap diff --cached --check
          git -C homebrew-tap commit -m "intelligence ${tag}"
          git -C homebrew-tap push
