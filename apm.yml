name: amichne-apm
version: 0.1.0
description: "APM-native marketplace for reusable AI tooling primitives and package-owned agent workflows."
author:
  name: Amichne
license: Apache-2.0
includes: auto

marketplace:
  owner:
    name: Amichne
    url: https://github.com/amichne
  outputs:
    claude:
      path: .claude-plugin/marketplace.json
    codex:
      path: .agents/plugins/marketplace.json
  claude:
    output: .claude-plugin/marketplace.json
  codex:
    output: .agents/plugins/marketplace.json
  build:
    tagPattern: "v{version}"
  packages:
    - name: engineering-baseline
      source: ./packages/engineering-baseline
      description: "Repository baseline for type-safe work: onboarding, shared instructions, and turn-level hooks that keep agents using the right local guidance."
      author: Amichne
      license: Apache-2.0
      repository: https://github.com/amichne/intelligence
      category: Engineering
      tags: ["core", "daily-driver", "design", "governance", "hooks", "instructions", "onboarding", "schemas", "skills"]
    - name: api-contracts
      source: ./packages/api-contracts
      description: "API contract workflow for JSON Schema and OpenAPI boundaries: schema modeling, operation authoring, typed errors, examples, and review."
      author: Amichne
      license: Apache-2.0
      repository: https://github.com/amichne/intelligence
      category: Engineering
      tags: ["agents", "api", "boundary", "contracts", "governance", "openapi", "schemas", "skills", "validation"]
    - name: kotlin-engineering
      source: ./packages/kotlin-engineering
      description: "Kotlin engineering workflow for code changes that need typed design, Kast semantics, review, filesystem evidence, Gradle proof, CI, and PR delivery."
      author: Amichne
      license: Apache-2.0
      repository: https://github.com/amichne/intelligence
      category: Coding
      tags: ["agents", "ci", "daily-driver", "delivery", "evidence", "gradle", "hooks", "kast", "kotlin", "operating-procedure", "quality", "review", "schemas", "skills", "testing", "validation"]
    - name: git-ci-operations
      source: ./packages/git-ci-operations
      description: "Git and CI operations workflow for evidence-backed changes: goals, TDD, Git hygiene, PRs, GitHub Actions, releases, and shell-safe automation."
      author: Amichne
      license: Apache-2.0
      repository: https://github.com/amichne/intelligence
      category: Engineering
      tags: ["automation", "ci", "git", "github", "operations", "planning", "pull-requests", "release", "skills", "tdd", "testing", "workflow"]
    - name: apm-authoring
      source: ./packages/apm-authoring
      description: "APM authoring workflow for maintaining package-owned primitives, marketplace manifests, hook assets, docs, and repository guidance with APM as the only publishing surface."
      author: Amichne
      license: Apache-2.0
      repository: https://github.com/amichne/intelligence
      category: Productivity
      tags: ["agents", "authoring", "docs", "governance", "hooks", "marketplace", "plugins", "repository", "schemas", "shell", "skills", "workflow"]
