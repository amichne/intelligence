name: Distribute Intelligence CLI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version label for artifact names.
        required: false
        type: string
      publish_release:
        description: Create or update a GitHub Release for this version.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: distribute-intelligence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package CLI
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Validate packaging inputs
        run: |
          bash -n bin/intelligence
          python3 -m py_compile scripts/intelligence.py scripts/package-intelligence.py
          node scripts/validate-manifests.mjs --portable

      - name: Resolve artifact version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git rev-parse --short=12 HEAD)"
          fi
          version="$(printf '%s' "${version}" | tr -c 'A-Za-z0-9._-' '-')"
          version="${version##[-._]}"
          version="${version%%[-._]}"
          if [[ -z "${version}" ]]; then
            echo "::error::resolved artifact version is empty"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved package version: ${version}"

      - name: Package CLI
        run: python3 scripts/package-intelligence.py --version "${{ steps.version.outputs.version }}" --out dist

      - name: Smoke test packaged CLI
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p /tmp/intelligence-smoke/unpack /tmp/intelligence-smoke/target
          tar -xzf "dist/intelligence-${version}.tar.gz" -C /tmp/intelligence-smoke/unpack
          packaged="/tmp/intelligence-smoke/unpack/intelligence-${version}/bin/intelligence"
          "${packaged}" --help
          "${packaged}" profile init \
            --repo /tmp/intelligence-smoke/target \
            --profile kotlin-repo-default \
            --dry-run

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-${{ steps.version.outputs.version }}
          path: |
            dist/intelligence-${{ steps.version.outputs.version }}.tar.gz
            dist/intelligence-${{ steps.version.outputs.version }}.zip
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: intelligence-${{ needs.package.outputs.version }}
          path: dist

      - name: Resolve release tag
        id: tag
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${INPUT_VERSION}"
            if [[ -z "${tag}" ]]; then
              echo "::error::workflow_dispatch release publishing requires the version input"
              exit 1
            fi
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* --generate-notes --title "${tag}"
          fi
