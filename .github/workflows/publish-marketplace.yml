name: Publish Marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Validate source
        run: |
          node scripts/validate-manifests.mjs --portable
          python3 scripts/publish-marketplace.py materialize --provider codex --out /tmp/intelligence-codex-marketplace
          node scripts/validate-manifests.mjs --portable --hydrated /tmp/intelligence-codex-marketplace
          python3 scripts/publish-marketplace.py materialize --provider github --out /tmp/intelligence-github-marketplace
          node scripts/validate-manifests.mjs --portable --hydrated /tmp/intelligence-github-marketplace

      - name: Publish Codex marketplace branch
        run: python3 scripts/publish-marketplace.py publish-branch --provider codex --branch codex

      - name: Publish GitHub marketplace branch
        run: python3 scripts/publish-marketplace.py publish-branch --provider github --branch github

      - name: Publish adapted marketplace manifests to main
        run: |
          python3 scripts/publish-marketplace.py sync-main-marketplaces
          if [ -z "$(git status --porcelain -- .agents/plugins/marketplace.json .github/plugin/marketplace.json)" ]; then
            echo "main adapted marketplaces already current"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .agents/plugins/marketplace.json .github/plugin/marketplace.json
          git commit -m "Publish adapted marketplace manifests"
          git push origin HEAD:main
