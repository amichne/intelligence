name: Verify APM Marketplace

on:
  pull_request:
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/verify-apm-marketplace.yml"
      - ".gitignore"
      - "AGENTS.md"
      - "README.md"
      - "apm.yml"
      - "docs/**"
      - "packages/**"
      - "zensical.toml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/verify-apm-marketplace.yml"
      - ".gitignore"
      - "AGENTS.md"
      - "README.md"
      - "apm.yml"
      - "docs/**"
      - "packages/**"
      - "zensical.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-apm-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up APM
        uses: microsoft/apm-action@v1
        with:
          setup-only: "true"
          apm-version: "0.18.0"

      - name: Verify APM version
        run: |
          set -euo pipefail
          apm --version
          apm --version | grep -F "0.18.0"

      - name: Preview marketplace outputs
        run: apm pack --marketplace=all --dry-run --check-versions --json

      - name: Audit APM packages
        run: apm audit --ci --no-policy
