name: Verify APM Marketplace

on:
  pull_request:
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/sync-provider-marketplaces.yml"
      - ".gitignore"
      - "AGENTS.md"
      - "README.md"
      - "apm.yml"
      - "docs/**"
      - "package-lock.json"
      - "package.json"
      - "scripts/prepare-apm-marketplace.py"
      - "scripts/validate-manifests.mjs"
      - "source/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-marketplace.yml"
      - ".github/workflows/sync-provider-marketplaces.yml"
      - ".gitignore"
      - "AGENTS.md"
      - "README.md"
      - "apm.yml"
      - "docs/**"
      - "package-lock.json"
      - "package.json"
      - "scripts/prepare-apm-marketplace.py"
      - "scripts/validate-manifests.mjs"
      - "source/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-apm-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Validate source manifests
        run: node scripts/validate-manifests.mjs --portable

      - name: Set up APM
        uses: microsoft/apm-action@v1
        with:
          setup-only: "true"
          apm-version: "0.18.0"

      - name: Verify APM version
        run: |
          set -euo pipefail
          apm --version
          apm --version | grep -F "0.18.0"

      - name: Prepare APM marketplace workspace
        run: python3 scripts/prepare-apm-marketplace.py stage --out build/apm-marketplace --check-root-manifest

      - name: Validate APM marketplace pack
        working-directory: build/apm-marketplace
        run: apm pack --marketplace=all --dry-run --check-versions --json

      - name: Audit APM workspace
        working-directory: build/apm-marketplace
        run: apm audit --ci --no-policy
