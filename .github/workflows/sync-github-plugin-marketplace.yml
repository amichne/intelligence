name: Sync GitHub Plugin Marketplace

on:
  pull_request:
    paths:
      - ".github/plugin/**"
      - ".github/workflows/sync-github-plugin-marketplace.yml"
      - "agents/**"
      - "concepts/**"
      - "hooks/**"
      - "marketplace.json"
      - "package-lock.json"
      - "package.json"
      - "plugins/**"
      - "schemas/**"
      - "scripts/publish-marketplace.py"
      - "scripts/validate-manifests.mjs"
      - "skills/**"
  push:
    branches:
      - main
    paths:
      - ".github/plugin/**"
      - ".github/workflows/sync-github-plugin-marketplace.yml"
      - "agents/**"
      - "concepts/**"
      - "hooks/**"
      - "marketplace.json"
      - "package-lock.json"
      - "package.json"
      - "plugins/**"
      - "schemas/**"
      - "scripts/publish-marketplace.py"
      - "scripts/validate-manifests.mjs"
      - "skills/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-github-plugin-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Validate source manifests
        run: node scripts/validate-manifests.mjs --portable

      - name: Check committed GitHub plugin marketplace
        run: python3 scripts/publish-marketplace.py sync-github-plugin --check

  sync:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Validate source manifests
        run: node scripts/validate-manifests.mjs --portable

      - name: Sync GitHub plugin marketplace
        run: python3 scripts/publish-marketplace.py sync-github-plugin

      - name: Validate synchronized manifests
        run: node scripts/validate-manifests.mjs --portable

      - name: Detect synchronized changes
        id: diff
        run: |
          if git diff --quiet -- .github/plugin; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit synchronized marketplace
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/plugin
          git commit -m "chore: sync GitHub plugin marketplace"
          git push
